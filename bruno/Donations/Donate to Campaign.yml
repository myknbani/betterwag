info:
  name: Donate to Campaign
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/api/campaigns/1/donate"
  body:
    type: json
    data: |-
      {
        "type": "one_time",
        "amount": 33000,
        "payment_method_id": "pm_card_visa"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
