services:
    postgres:
        container_name: betterwag_db
        image: postgres:18.3
        environment:
            POSTGRES_DB: betterwag
            POSTGRES_USER: betterwag
            POSTGRES_PASSWORD: password
        ports:
            - '5432:5432'
        volumes:
            - postgres_data:/var/lib/postgresql
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U "$${POSTGRES_USER:-betterwag}" -d "$${POSTGRES_DB:-betterwag}"']
            interval: 5s
            timeout: 5s
            retries: 5

    redis:
        container_name: betterwag_redis
        image: redis:7-alpine
        ports:
            - '6379:6379'
        volumes:
            - redis_data:/data

volumes:
    postgres_data:
    redis_data:
